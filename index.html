<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Content Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A24;--bg4:#22222E;
  --line:#ffffff0D;--line2:#ffffff15;
  --txt:#F0EEF8;--txt2:#9896B0;--txt3:#5A5870;
  --gold:#E8C97A;--gold2:#F5E4A8;--gold-bg:#E8C97A0F;
  --green:#4ADE80;--green-bg:#4ADE800D;
  --red:#F87171;--red-bg:#F871710D;
  --accent:#7C6FFF;--accent2:#A99CFF;--accent-bg:#7C6FFF0D;
  --r:8px;
}
html{font-size:15px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6}
.page{max-width:860px;margin:0 auto;padding:0 24px 80px}

/* TOP BAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--line2);margin-bottom:36px}
.brand{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold)}
.by{font-size:12px;color:var(--txt3)}
.by b{color:var(--txt2);font-weight:500}

/* HERO */
.hero{margin-bottom:32px}
.eyebrow{display:inline-flex;align-items:center;gap:5px;background:var(--gold-bg);border:1px solid #E8C97A1A;color:var(--gold);font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:14px}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,38px);font-weight:800;line-height:1.1;letter-spacing:-0.025em;margin-bottom:8px}
.hero h1 em{font-style:normal;color:var(--txt2)}
.hero p{font-size:13.5px;color:var(--txt2);max-width:480px}

/* INPUT CARD */
.icard{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:22px;margin-bottom:10px}
.lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:10px;display:block}

/* PLATFORMS */
.pfs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px}
.pf{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--r);padding:11px 8px;cursor:pointer;transition:all .12s;text-align:center}
.pf:hover{border-color:#E8C97A33;background:var(--bg4)}
.pf.on{border-color:var(--gold);background:var(--gold-bg)}
.pf.on .pfn{color:var(--gold)}
.pfi{font-size:18px;margin-bottom:5px;display:block}
.pfn{font-size:10px;font-weight:500;color:var(--txt2);letter-spacing:0.03em}

.inp{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--r);padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .12s;width:100%}
.inp:focus{border-color:#7C6FFF44}
.inp::placeholder{color:var(--txt3)}
textarea.inp{resize:none;height:68px;line-height:1.5;display:block}
.inp-row{margin-bottom:10px}

.btn{width:100%;background:var(--gold);color:#0A0A0F;border:none;border-radius:var(--r);padding:12px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:opacity .12s;margin-top:4px}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.3;cursor:not-allowed}

/* LOADER */
.loader{display:none;text-align:center;padding:44px 20px}
.loader.on{display:block}
.spin{width:36px;height:36px;border:1.5px solid var(--line2);border-top-color:var(--gold);border-radius:50%;animation:spin .65s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--txt2)}
.lstep{font-family:'Syne',sans-serif;font-size:9.5px;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-top:5px}

/* RESULTS */
.results{display:none}.results.on{display:block}

/* SCORE */
.sco{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:22px;margin-bottom:10px;display:grid;grid-template-columns:84px 1fr;gap:18px;align-items:start}
.sco-num{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1;letter-spacing:-0.03em}
.sco-sub{font-size:10px;color:var(--txt3);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px}
.sco-desc{font-size:13.5px;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:14px;letter-spacing:0.02em}
.tg{background:var(--green-bg);color:var(--green);border:1px solid #4ADE801A}
.tr{background:var(--red-bg);color:var(--red);border:1px solid #F871711A}

/* SECTION */
.sec{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;overflow:hidden;margin-bottom:10px}
.sh{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:background .1s;user-select:none}
.sh:hover{background:var(--bg3)}
.st{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt2);display:flex;align-items:center;gap:7px}
.si{font-size:13px}
.chv{color:var(--txt3);font-size:11px;transition:transform .18s}
.sec.open .chv{transform:rotate(180deg)}
.sb{display:none;padding:0 18px 18px;border-top:1px solid var(--line)}
.sec.open .sb{display:block}

/* METRICS */
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:14px}
.met{background:var(--bg3);border-radius:var(--r);padding:12px;border:1px solid var(--line)}
.mv{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--txt);margin-bottom:2px}
.ml{font-size:10px;color:var(--txt3);margin-bottom:5px}
.mt{font-size:10px;font-weight:500;display:flex;align-items:center;gap:3px}
.tu{color:var(--green)}.td{color:var(--red)}.tn{color:var(--txt3)}

/* INSIGHTS */
.ins-list{padding-top:12px;display:flex;flex-direction:column;gap:8px}
.ins{display:grid;grid-template-columns:26px 1fr;gap:10px;align-items:start}
.id{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.id.g{background:var(--green-bg);color:var(--green)}.id.b{background:var(--red-bg);color:var(--red)}.id.t{background:var(--accent-bg);color:var(--accent2)}
.it strong{font-size:12.5px;font-weight:500;display:block;margin-bottom:2px;color:var(--txt)}
.it p{font-size:12px;color:var(--txt2);line-height:1.55}

/* POSTS */
.post-list{padding-top:12px;display:flex;flex-direction:column;gap:8px}
.post{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden}
.ph{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid var(--line)}
.pl{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:12px;letter-spacing:0.06em;text-transform:uppercase}
.pl.formula{background:var(--green-bg);color:var(--green);border:1px solid #4ADE801A}
.pl.example{background:var(--gold-bg);color:var(--gold);border:1px solid #E8C97A1A}
.pa{display:flex;align-items:center;gap:7px}
.pp{font-size:10px;color:var(--txt3);letter-spacing:0.06em;text-transform:uppercase}
.cbtn{background:var(--bg4);border:1px solid var(--line2);border-radius:4px;padding:3px 9px;font-size:10px;font-weight:500;cursor:pointer;color:var(--txt2);transition:all .1s;font-family:'DM Sans',sans-serif}
.cbtn:hover{border-color:#E8C97A33;color:var(--gold)}
.cbtn.ok{border-color:#4ADE8033;color:var(--green)}
.pb{padding:12px 13px;font-size:12px;line-height:1.7;color:var(--txt2);white-space:pre-line}
.pf2{display:flex;gap:12px;padding:8px 13px;border-top:1px solid var(--line);flex-wrap:wrap}
.ps{font-size:10.5px;color:var(--txt3)}.ps b{color:var(--txt2);font-weight:500}
.pw{font-size:10.5px;color:var(--txt3);font-style:italic;margin-left:auto;text-align:right}

/* PLAN */
.plan{padding-top:12px;display:flex;flex-direction:column;gap:8px}
.act{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:start;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px}
.an{width:26px;height:26px;background:var(--accent-bg);border:1px solid #7C6FFF22;color:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:9.5px;font-weight:700;flex-shrink:0}
.ac strong{font-size:12.5px;font-weight:500;color:var(--txt);display:block;margin-bottom:2px}
.ac p{font-size:11.5px;color:var(--txt2);line-height:1.5}
.at{font-size:9.5px;font-weight:600;color:var(--txt3);white-space:nowrap;margin-top:2px;letter-spacing:0.04em}

/* CTA */
.cta{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:26px;text-align:center;margin-top:10px}
.cta h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.01em;margin-bottom:5px}
.cta p{font-size:13px;color:var(--txt2);margin-bottom:16px}
.cc{display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.ci{font-size:12px;color:var(--txt2)}.ci b{color:var(--gold);font-weight:500}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

@media(max-width:600px){
  .pfs{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:1fr 1fr}
  .sco{grid-template-columns:1fr}
  .hero h1{font-size:24px}
}
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="brand">AI Content Audit</div>
    <div class="by">Для <b>Евроторг</b> · Pavel Dranchuk</div>
  </div>

  <div class="hero">
    <div class="eyebrow">✦ Инструмент</div>
    <h1>Аудит контента<br><em>за 60 секунд</em></h1>
    <p>Введите аккаунт бренда — разбор что работает, что нет, и готовые AI-посты.</p>
  </div>

  <div class="icard">
    <span class="lbl">Платформа</span>
    <div class="pfs">
      <div class="pf on" data-platform="instagram" onclick="selectPf(this)"><span class="pfi">📸</span><div class="pfn">Instagram</div></div>
      <div class="pf" data-platform="tiktok" onclick="selectPf(this)"><span class="pfi">🎵</span><div class="pfn">TikTok</div></div>
      <div class="pf" data-platform="telegram" onclick="selectPf(this)"><span class="pfi">✈️</span><div class="pfn">Telegram</div></div>
      <div class="pf" data-platform="youtube" onclick="selectPf(this)"><span class="pfi">▶️</span><div class="pfn">YouTube</div></div>
    </div>

    <span class="lbl">Аккаунт</span>
    <div class="inp-row"><input class="inp" id="handle" placeholder="@evrotorg или evrotorg.by" type="text"></div>

    <span class="lbl">Контекст</span>
    <div class="inp-row"><textarea class="inp" id="ctx">Евроторг — крупнейший ритейл Беларуси. Запускают AI-направление: продюсер ИИ-контента, SMM с AI, AI-агенты. Цель — реальный контент с AI, а не «для галочки».</textarea></div>

    <button class="btn" id="runBtn" onclick="runAudit()">→ Запустить аудит</button>
  </div>

  <div class="loader" id="loader">
    <div class="spin"></div>
    <div class="ltxt">Анализирую контент-стратегию...</div>
    <div class="lstep" id="ls">Изучаю паттерны вовлечённости</div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
let pf = 'instagram';
function selectPf(el){document.querySelectorAll('.pf').forEach(p=>p.classList.remove('on'));el.classList.add('on');pf=el.dataset.platform}
const steps=['Изучаю паттерны вовлечённости...','Анализирую форматы...','Сравниваю с бенчмарками...','Генерирую примеры постов...','Формирую план действий...'];

function runAudit(){
  const handle=document.getElementById('handle').value.trim()||'evrotorg';
  const ctx=document.getElementById('ctx').value.trim();
  const btn=document.getElementById('runBtn');
  const loader=document.getElementById('loader');
  const results=document.getElementById('results');
  btn.disabled=true;loader.classList.add('on');results.classList.remove('on');results.innerHTML='';
  let si=0;const lsel=document.getElementById('ls');
  const timer=setInterval(()=>{si=(si+1)%steps.length;lsel.textContent=steps[si];},1500);
  const pfNames={instagram:'Instagram',tiktok:'TikTok',telegram:'Telegram',youtube:'YouTube Shorts'};
  setTimeout(()=>{clearInterval(timer);loader.classList.remove('on');btn.disabled=false;
    const d=buildAudit(handle,pf,pfNames[pf],ctx);renderResults(d,handle,pfNames[pf]);},4600);
}

function buildAudit(handle,platform,pfName,ctx){
  const h=handle.replace('@','').toLowerCase();
  const scores={instagram:62,tiktok:54,telegram:71,youtube:48};
  const acct=h.includes('evrotorg')?'Евроторг':`@${h}`;
  const pd={
    instagram:{freq:'4–5 постов/нед',er:'1.8%',variety:'55% фото, 30% Reels',ft:'neutral',et:'bad',vt:'bad',fc:'норма для ритейла',ec:'ниже бенчмарка 3.5%',vc:'мало видео',str:['Регулярный постинг','Качественное фото','Активные Stories'],weak:['Низкий ER на Reels','Мало UGC','Слабые CTA'],ins:[{t:'g',h:'Сильная визуальная идентичность',b:'Бренд выдержан в едином стиле. Алгоритм хорошо работает с аккаунтами, где есть визуальная последовательность.'},{t:'b',h:'Reels недоиспользованы',b:'Reels дают в 3–4× больше охвата чем фото, но в ленте доминируют статичные посты — прямые потери охвата.'},{t:'t',h:'AI-контент как эксперимент',b:'Серия «Этот образ создал ИИ» или «AI vs дизайнер» вызывает обсуждение и органически набирает охват.'},{t:'b',h:'Нет пользовательского контента',b:'UGC — самый дешёвый и доверительный формат для ритейла. Ни одной repost-механики. Потенциал роста ER до 5–7%.'},{t:'t',h:'Интерактивность в Stories',b:'Stories с опросами и слайдерами дают в 2× больше переходов. Добавьте блок: «Угадай цену», «AI-стилист советует».'}]},
    tiktok:{freq:'2–3 видео/нед',er:'3.2%',variety:'100% видео',ft:'bad',et:'neutral',vt:'good',fc:'нужно 5–7 для роста',ec:'на уровне рынка',vc:'правильный формат',str:['Нативный видео-формат','Молодая аудитория','Органический охват'],weak:['Низкая частота','Нет трендовых форматов','Слабые хуки (1–3 сек)'],ins:[{t:'g',h:'TikTok даёт органический охват',b:'Алгоритм продвигает контент новых аккаунтов через FYP без рекламного бюджета — смотрит на досмотры, а не на подписчиков.'},{t:'b',h:'3 секунды решают всё',b:'65% зрителей уходят в первые 3 секунды без захвата. Нужен паттерн: шок/вопрос/обещание с первого кадра.'},{t:'t',h:'AI-тренды сейчас на пике',b:'Теги #AIart #нейросеть набирают 2–5M просмотров. Серия «Как мы создаём контент с ИИ» — вирусность и попадание в тренд.'},{t:'b',h:'Нет дуэтов и коллабораций',b:'Дуэты — ключевой механизм роста TikTok-брендов. Без них аккаунт растёт в 3–5× медленнее.'},{t:'t',h:'Серийный контент = лояльность',b:'Еженедельная рубрика «AI-образ недели» создаёт причину возвращаться — алгоритм видит retention и продвигает.'}]},
    telegram:{freq:'1–2 поста/день',er:'8.4%',variety:'60% текст, 25% фото',ft:'good',et:'good',vt:'neutral',fc:'отличная регулярность',ec:'выше среднего',vc:'можно добавить видео',str:['Высокий ER','Регулярность','Лояльная аудитория'],weak:['Мало интерактива','Нет видео','Слабая вирусность'],ins:[{t:'g',h:'Telegram — лучший канал по ER',b:'ER 8%+ — топ-уровень для брендового Telegram-канала. Аудитория вовлечена и доверяет — сильная база для AI-контента.'},{t:'b',h:'Контент не шерится',b:'Посты практически не пересылаются. Причина: контент информационный, но не практически ценный. Нужны форматы «сохрани и поделись».'},{t:'t',h:'AI-боты прямо в канале',b:'Telegram позволяет встраивать AI-ботов через кнопки — «Попроси AI-стилиста подобрать образ». Уникальный интерактив недоступный в других соцсетях.'},{t:'b',h:'Нет видеоконтента',b:'Канал почти не использует короткое вертикальное видео, а видео-посты получают в 2.5× больше реакций.'},{t:'t',h:'Эксклюзив для подписчиков',b:'Рубрика «AI только здесь» — промпты, лайфхаки, подборки. Создаёт причину подписаться именно на Telegram.'}]},
    youtube:{freq:'1–2 Shorts/нед',er:'2.1%',variety:'100% видео',ft:'bad',et:'bad',vt:'good',fc:'нужно минимум 5/нед',ec:'критически низкий',vc:'правильный формат',str:['Поисковый трафик Google','Долгий срок жизни','Высокое доверие'],weak:['Очень низкая частота','Нет SEO в заголовках','Слабые превью'],ins:[{t:'g',h:'Shorts индексируются в Google',b:'В отличие от TikTok, Shorts появляются в поиске Google — органический SEO-трафик для ритейла без дополнительного бюджета.'},{t:'b',h:'Частота — критическая проблема',b:'Shorts требует 5–7 роликов в неделю для рекомендаций. При 1–2 роликах канал фактически невидим для новой аудитории.'},{t:'t',h:'AI-генерация решает проблему частоты',b:'С Runway, Kling, Pika можно генерировать Shorts из одного фото товара за 5 минут — масштаб без раздувания команды.'},{t:'b',h:'Thumbnails не оптимизированы',b:'CTR превью менее 3% при норме 6–10%. Маленький текст, нет лица, нет контраста. Исправление даёт +40–60% к просмотрам.'},{t:'t',h:'Серия «AI делает покупки»',b:'AI-персонаж выбирает товары по заданию зрителя — интерактивный формат. Высокая досматриваемость, алгоритм продвигает приоритетно.'}]},
  };
  const posts={
    instagram:[
      {pf:pfName,type:'formula',lbl:'AI-стилист',txt:`✨ Попросила наш AI подобрать образ на осень — вот что получилось\n\n[Сгенерированный AI-образ с реальными товарами]\n\nAI выбрал:\n• Пальто в клетку — 89 руб.\n• Водолазка молочная — 34 руб.\n• Джинсы прямые — 67 руб.\n\nИтого: 190 руб. за полный look 🍂\n\nА что бы добавили вы? Пишите в комментарии!\n\n#евроторг #стиль #осень2025 #AIстилист`,reach:'+85% vs стандартный',er:'5.2–7.1%',why:'AI + товары + цена = высокий ER'},

function renderResults(d,handle,pfName){
  const el=document.getElementById('results');
  const sc=d.score>=70?'var(--green)':d.score>=50?'var(--gold)':'var(--red)';
  const sl=d.score>=70?'Хорошо':d.score>=50?'Есть потенциал':'Требует работы';
  const tagsG=d.strengths.map(s=>`<span class="tag tg">✓ ${s}</span>`).join('');
  const tagsR=d.weaknesses.map(w=>`<span class="tag tr">✗ ${w}</span>`).join('');
  const mL={freq:'Частота',er:'Вовлечённость',variety:'Форматы'};
  const mH=Object.entries(d.metrics).map(([k,m])=>{const tc={good:'tu',bad:'td',neutral:'tn'}[m.t]||'tn';const ti={good:'↑',bad:'↓',neutral:'→'}[m.t];return`<div class="met"><div class="mv">${m.v}</div><div class="ml">${mL[k]||k}</div><div class="mt ${tc}">${ti} ${m.c}</div></div>`;}).join('');
  const ic={g:'g',b:'b',t:'t'};const ii={g:'✓',b:'✗',t:'→'};
  const iH=d.insights.map(i=>`<div class="ins"><div class="id ${ic[i.t]}">${ii[i.t]}</div><div class="it"><strong>${i.h}</strong><p>${i.b}</p></div></div>`).join('');
  window._posts=d.posts.map(p=>p.txt);
  const pH=d.posts.map((p,i)=>`<div class="post"><div class="ph"><span class="pl ${p.type}">${p.lbl}</span><div class="pa"><span class="pp">${p.pf}</span><button class="cbtn" onclick="cp(this,${i})">Копировать</button></div></div><div class="pb">${p.txt}</div><div class="pf2"><span class="ps">📈 <b>${p.reach}</b></span><span class="ps">💬 ER: <b>${p.er}</b></span><span class="pw">${p.why}</span></div></div>`).join('');
  const plH=d.plan.map(a=>`<div class="act"><div class="an">${a.n}</div><div class="ac"><strong>${a.h}</strong><p>${a.b}</p></div><div class="at">${a.t}</div></div>`).join('');
  el.innerHTML=`
  <div class="sco">
    <div><div class="sco-num" style="color:${sc}">${d.score}</div><div class="sco-sub">${sl} · ${pfName}</div></div>
    <div><div class="sco-desc">${d.comment}</div><div class="tags">${tagsG}${tagsR}</div></div>
  </div>
  <div class="sec open" id="sm"><div class="sh" onclick="tog('sm')"><span class="st"><span class="si">📊</span>Метрики</span><span class="chv">▾</span></div><div class="sb"><div class="mg">${mH}</div></div></div>
  <div class="sec open" id="si"><div class="sh" onclick="tog('si')"><span class="st"><span class="si">🔍</span>Детальный разбор</span><span class="chv">▾</span></div><div class="sb"><div class="ins-list">${iH}</div></div></div>
  <div class="sec open" id="sp"><div class="sh" onclick="tog('sp')"><span class="st"><span class="si">✍️</span>Готовые посты с AI</span><span class="chv">▾</span></div><div class="sb"><div class="post-list">${pH}</div></div></div>
  <div class="sec open" id="spl"><div class="sh" onclick="tog('spl')"><span class="st"><span class="si">🚀</span>План действий</span><span class="chv">▾</span></div><div class="sb"><div class="plan">${plH}</div></div></div>
  <div class="cta"><h3>Хотите внедрить это в Евроторге?</h3><p>Готов выстроить AI-контент систему с нуля — от пайплайна до метрик.</p><div class="cc"><span class="ci">Telegram: <b>@pav_sep</b></span><span class="ci">Тел: <b>+48 571 502 355</b></span><span class="ci">Email: <b>paveldranchuk36@gmail.com</b></span></div></div>`;
  el.classList.add('on');el.scrollIntoView({behavior:'smooth',block:'start'});
}
function tog(id){document.getElementById(id).classList.toggle('open')}
function cp(btn,idx){const txt=window._posts?.[idx]||'';navigator.clipboard.writeText(txt).then(()=>{btn.textContent='Скопировано ✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Копировать';btn.classList.remove('ok');},2000);})}
</script>
</body>
